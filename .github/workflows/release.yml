name: 🚀 Release Pipeline

# Only triggers on version tags (v*) and manual dispatch
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v3.1.1)'
        required: true
        type: string
        default: 'v3.1.1'
      dry_run:
        description: 'Dry run (test without creating release)'
        required: false
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  actions: read
  deployments: write

jobs:
  release:
    name: 🎉 Release Process
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔢 Extract and Validate Version
        id: version
        run: |
          # Determine version source
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            echo "📋 Version from manual input: $VERSION"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "🏷️ Version from tag: $VERSION"
          else
            echo "❌ ERROR: Invalid trigger event"
            echo "Event: ${{ github.event_name }}"
            echo "Ref type: ${{ github.ref_type }}"
            exit 1
          fi
          
          # Validate version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "❌ ERROR: Invalid version format '$VERSION'"
            echo "Expected format: vX.Y.Z (e.g., v2.1.0)"
            exit 1
          fi
          
          # Extract version number (remove 'v' prefix)
          VERSION_NUMBER="${VERSION#v}"
          
          # Output results
          {
            echo "version=$VERSION"
            echo "version_number=$VERSION_NUMBER"
          } >> "$GITHUB_OUTPUT"
          
          echo "✅ Version validation passed: $VERSION ($VERSION_NUMBER)"

      - name: 🧪 Run Tests
        run: |
          echo "🧪 Running tests..."
          # Basic script validation
          chmod +x bin/portkill
          ./bin/portkill --version
          ./bin/portkill --help >/dev/null
          echo "✅ Tests passed"

      - name: 🏗️ Install Package Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: 📦 Build Release Packages
        run: |
          chmod +x scripts/build-packages.sh
          ./scripts/build-packages.sh --version "${{ steps.version.outputs.version_number }}"

      - name: 📦 Create GitHub Release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "PortKill ${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 Release ${{ steps.version.outputs.version }}
            
            ### 📦 Installation
            ```bash
            brew install mr-tanta/portkill/portkill
            ```
            
            ### 🔧 Usage
            ```bash
            portkill doctor 3000
            portkill --dry-run 3000
            portkill 3000
            ```

            ### ✨ Highlights
            - `doctor` explains what owns a port and suggests safe next steps
            - Default terminal kills ask before terminating; use `--yes` for automation
            - Bash, Zsh, and Fish completions are available with `portkill completion`
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            bin/portkill
            install.sh
            uninstall.sh
            build/*.deb
            build/*.rpm
            build/*.sha256
            build/checksums.txt

      - name: 🚢 Record Production Deployment
        if: github.event.inputs.dry_run != 'true'
        id: production_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const releaseUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/${version}`;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: `PortKill ${version} release`,
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
              transient_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              environment_url: releaseUrl,
              description: `PortKill ${version} released`
            });

            core.setOutput('deployment_id', String(deployment.data.id));
            core.setOutput('environment_url', releaseUrl);

      - name: 🎉 Success Message
        run: |
          echo "✅ Release workflow completed successfully!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Event: ${{ github.event_name }}"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "🧪 DRY RUN MODE - No release created"
          else
            echo "📦 Release created successfully"
          fi
